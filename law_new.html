<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>伺服器相關規定(上一版本)</title>

  <!-- Google Fonts：Noto Serif TC + Playfair Display -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@200..900&family=Playfair+Display:wght@600;700;800&display=swap" rel="stylesheet">

  <!-- Markdown 解析庫：marked -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

  <style>
    :root {
      color-scheme: light dark;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 0;
      font-family: "Noto Serif TC", system-ui, -apple-system, BlinkMacSystemFont,
        "Segoe UI", sans-serif;
      background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%);
      color: #1a1a1a;
      line-height: 1.85;
    }

    .page {
      max-width: 900px;
      margin: 0 auto;
      padding: 48px 16px 60px;
    }

    header {
      margin-bottom: 40px;
      border-bottom: 3px solid #0d1b2a;
      padding-bottom: 20px;
      animation: fadeInDown 0.8s ease-out;
    }

    header h1 {
      margin: 0 0 8px 0;
      font-size: 2.6rem;
      font-weight: 700;
      font-family: "Playfair Display", "Noto Serif TC", serif;
      letter-spacing: 0.05em;
      color: #0d1b2a;
    }

    header .subtitle {
      font-size: 0.95rem;
      color: #4a5568;
      font-weight: 500;
      letter-spacing: 0.05em;
    }

    .card {
      background: #ffffff;
      border-radius: 0;
      padding: 48px 44px;
      box-shadow:
        0 2px 8px rgba(13, 27, 42, 0.06),
        inset 0 1px 0 rgba(255, 255, 255, 0.8);
      border: 1px solid #d0d7e0;
      border-top: 3px solid #0d1b2a;
      animation: fadeInUp 0.8s ease-out;
    }

    /* Markdown 內容基本樣式 */
    #md-content {
      font-size: 1.05rem;
      color: #2d3748;
    }

    #md-content h1,
    #md-content h2,
    #md-content h3,
    #md-content h4 {
      margin-top: 1.8em;
      margin-bottom: 0.8em;
      font-weight: 700;
      letter-spacing: 0.04em;
      color: #0d1b2a;
    }

    #md-content h1 {
      font-size: 1.8rem;
      border-bottom: 3px solid #0d1b2a;
      padding-bottom: 0.4em;
      padding-top: 0.8em;
      margin-top: 2em;
      font-family: "Playfair Display", "Noto Serif TC", serif;
      font-weight: 700;
    }

    #md-content h2 {
      font-size: 1.5rem;
      border-bottom: 2px solid #1a3a52;
      padding-bottom: 0.3em;
      padding-top: 0.6em;
      font-family: "Playfair Display", "Noto Serif TC", serif;
      font-weight: 700;
    }

    #md-content h3 {
      font-size: 1.1rem;
      color: #1a3a52;
      font-weight: 700;
    }

    #md-content p {
      margin: 0.8em 0;
      line-height: 1.95;
      color: #2d3748;
      font-weight: 500;
    }

    #md-content strong {
      font-weight: 700;
      color: #0d1b2a;
    }

    #md-content em {
      font-style: italic;
      color: #1a3a52;
    }

    #md-content ul,
    #md-content ol {
      padding-left: 1.8em;
      margin: 0.8em 0 1.2em;
    }

    #md-content li {
      margin: 0.5em 0;
      line-height: 1.85;
      color: #2d3748;
    }

    #md-content code {
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      background: #f0f4f8;
      padding: 0.15em 0.5em;
      border-radius: 4px;
      font-size: 0.92em;
      color: #2c5aa0;
      font-weight: 500;
    }

    #md-content pre code {
      display: block;
      padding: 16px 18px;
      background: #1a3a52;
      color: #e8eef7;
      border-radius: 8px;
      overflow-x: auto;
      font-size: 0.9em;
      line-height: 1.6;
      font-weight: 400;
    }

    #md-content blockquote {
      margin: 1.2em 0;
      padding: 1em 1.2em;
      border-left: 4px solid #2c5aa0;
      background: #f0f4f8;
      color: #1a3a52;
      font-weight: 500;
      font-style: italic;
    }

    #md-content a {
      color: #1a3a52;
      text-decoration: none;
      border-bottom: 2px solid rgba(26, 58, 82, 0.3);
      transition: all 0.3s ease;
      font-weight: 600;
    }

    #md-content a:hover {
      border-bottom-color: #1a3a52;
      color: #0d1b2a;
    }

    .loading,
    .error {
      font-size: 0.95rem;
      color: #4a5568;
    }

    .loading {
      animation: pulse 1.5s ease-in-out infinite;
    }

    .error {
      color: #c53030;
      font-weight: 600;
    }

    .footer {
      margin-top: 40px;
      font-size: 0.9rem;
      color: #4a5568;
      border-top: 2px solid #e2e8f0;
      padding-top: 24px;
      animation: fadeInUp 0.8s ease-out 0.2s both;
    }

    .footer a {
      color: #1a3a52;
      text-decoration: none;
      border-bottom: 1px solid rgba(26, 58, 82, 0.3);
      transition: all 0.3s ease;
      font-weight: 600;
    }

    .footer a:hover {
      border-bottom-color: #1a3a52;
      color: #0d1b2a;
    }

    .footer-updated {
      margin-top: 8px;
      color: #718096;
      font-size: 0.85rem;
    }

    @keyframes fadeInDown {
      from {
        opacity: 0;
        transform: translateY(-20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes pulse {
      0%, 100% {
        opacity: 1;
      }
      50% {
        opacity: 0.6;
      }
    }

    /* 目錄導航樣式 */
    .toc-container {
      background: #f8f9fa;
      border: 1px solid #d0d7e0;
      border-left: 4px solid #0d1b2a;
      border-radius: 0;
      padding: 24px 28px;
      margin-bottom: 32px;
      animation: fadeInUp 0.8s ease-out;
    }

    .toc-container h3 {
      margin: 0 0 16px 0;
      font-size: 1.1rem;
      font-weight: 700;
      font-family: "Playfair Display", "Noto Serif TC", serif;
      color: #0d1b2a;
    }

    .toc-list {
      list-style: none;
      padding: 0;
      margin: 0;
    }

    .toc-list li {
      margin: 6px 0;
    }

    .toc-list a {
      color: #1a3a52;
      text-decoration: none;
      font-size: 0.95rem;
      border: none;
      transition: all 0.3s ease;
      display: inline-block;
      font-weight: 500;
      padding: 4px 0;
    }

    .toc-list a:hover {
      color: #0d1b2a;
      padding-left: 4px;
      font-weight: 600;
    }

    .toc-level-1 {
      padding-left: 0;
    }

    .toc-level-2 {
      padding-left: 20px;
      color: #718096;
    }

    .toc-level-2 a {
      color: #2d3748;
      font-size: 0.9rem;
    }
  </style>
</head>
<body>
  <div class="page">
    <header>
      <h1>伺服器相關規定(上一版本)</h1>
      <div class="subtitle">來源文件：law 2026.0121.22.md</div>
    </header>

    <div class="card">
      <div id="toc-container" style="display:none;"></div>
      <div id="status" class="loading">載入中…</div>
      <div id="md-content" style="display:none;"></div>
    </div>

    <div class="footer">
      <div class="footer-main">
        規定請依照
        <a href="https://discord.com/channels/1461742354087153951/1461749176747425915" target="_blank" rel="noopener noreferrer">
          Discord 頻道公告
        </a>
        為主。
        </br>
        若有任何問題，請聯絡管理人員 lxy.1085。
      </div>
      <div class="footer-updated" id="updated-time"></div>
    </div>
  </div>

  <script>
    // 設定 marked 一些基本選項（可依需要調整）
    marked.setOptions({
      breaks: true,           // 讓換行視為 <br>
      gfm: true               // 支援 GitHub 風格 Markdown
    });

    const statusEl = document.getElementById("status");
    const contentEl = document.getElementById("md-content");
    const updatedEl = document.getElementById("updated-time");
    const tocContainerEl = document.getElementById("toc-container");

    // 生成目錄
    function generateTableOfContents(html) {
      const parser = new DOMParser();
      const doc = parser.parseFromString(html, 'text/html');
      const headings = doc.querySelectorAll('h1, h2');
      
      if (headings.length === 0) return null;

      const tocList = document.createElement('ul');
      tocList.className = 'toc-list';

      headings.forEach((heading, index) => {
        const level = parseInt(heading.tagName[1]);
        const text = heading.textContent;
        const id = `heading-${index}`;
        
        // 為原始 HTML 中的標題添加 ID（稍後操作）
        heading.id = id;

        const li = document.createElement('li');
        li.className = `toc-level-${level}`;

        const a = document.createElement('a');
        a.href = `#${id}`;
        a.textContent = text;
        a.addEventListener('click', function(e) {
          e.preventDefault();
          const target = document.getElementById(id);
          if (target) {
            target.scrollIntoView({ behavior: 'smooth' });
          }
        });

        li.appendChild(a);
        tocList.appendChild(li);
      });

      return tocList;
    }

    // 從同資料夾讀取 law.md（GitHub Pages 上也適用）
    fetch("law 2026.0121.22.md")
      .then((res) => {
        if (!res.ok) {
          throw new Error("無法讀取 規定檔案 請洽管理人員 lxy.1085" + res.status);
        }
        return res.text();
      })
      .then((text) => {
        // 從最後一行往上尋找 time: 標記，作為更新時間
        const lines = text.split(/\r?\n/);
        let lastTime = null;
        for (let i = lines.length - 1; i >= 0; i--) {
          const trimmed = lines[i].trim();
          if (trimmed.toLowerCase().startsWith("time:")) {
            lastTime = trimmed.slice(5).trim();
            // 從 markdown 內容中移除這一行，不在正文顯示
            lines.splice(i, 1);
            break;
          }
        }

        // 彈窗顯示邏輯
        const showNotice = 1; // 1 為顯示，0 為不顯示
        if (showNotice) {
          const noticeOverlay = document.createElement('div');
          noticeOverlay.style = `
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7); display: flex; align-items: center;
            justify-content: center; z-index: 9999; backdrop-filter: blur(4px);
          `;
          
          const noticeBox = document.createElement('div');
          noticeBox.style = `
            background: #fffbf0; padding: 30px; border-radius: 12px;
            max-width: 400px; width: 90%; text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2); border: 2px solid #1a3a52;
          `;
          
          noticeBox.innerHTML = `
            <h3 style="margin-top:0; color:#c53030;">重要事項</h3>
            <p style="color:#2d3748; font-weight:600; margin-bottom:20px;">
              本規約為較舊版本 </br> 請以 <a href="index.html" style="color:#1a3a52; text-decoration:underline;">目前版本</a> 為準。
            </p>
            <button id="close-notice" style="
              background:#1a3a52; color:white; border:none; padding:10px 25px;
              border-radius:6px; cursor:pointer; font-family:inherit; font-weight:700;
            ">我了解了</button>
          `;
          
          noticeOverlay.appendChild(noticeBox);
          document.body.appendChild(noticeOverlay);
          
          document.getElementById('close-notice').onclick = () => {
            noticeOverlay.remove();
          };
        }

        const cleanedText = lines.join("\n");
        const html = marked.parse(cleanedText);
        contentEl.innerHTML = html;

        // 為標題添加 ID
        const headings = contentEl.querySelectorAll('h1, h2');
        headings.forEach((heading, index) => {
          heading.id = `heading-${index}`;
        });

        // 生成目錄
        const toc = generateTableOfContents(html);
        if (toc && toc.children.length > 0) {
          const tocWrapper = document.createElement('div');
          tocWrapper.className = 'toc-container';
          const tocTitle = document.createElement('h3');
          tocTitle.textContent = '目錄';
          tocWrapper.appendChild(tocTitle);
          tocWrapper.appendChild(toc);
          tocContainerEl.appendChild(tocWrapper);
          tocContainerEl.style.display = 'block';
        }

        statusEl.style.display = "none";
        contentEl.style.display = "block";

        if (lastTime && updatedEl) {
          updatedEl.textContent = "最後更新時間：" + lastTime;
        }
      })
      .catch((err) => {
        console.error(err);
        statusEl.textContent = "載入 規定文件 時發生錯誤，請洽詢管理人員 lxy.1085。";
        statusEl.className = "error";
      });
  </script>
</body>
</html>
